# Set at link time via `supabase link --project-ref <ref>`.
project_id = "ecotecplast-colorhub"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
# Auto-run on `supabase db reset` (local + --linked). Default now points
# back to seed.sql — safe because it no longer inserts demo masterbatches
# (only providers, sample clients, and RAL reference colors). The operator
# adds real MBs via /dashboard/calibration-lab/new.
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = ["https://ecotecplast.com"]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false
